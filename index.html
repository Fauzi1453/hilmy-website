<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>hilmy.cc</title>

  <!-- FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- ICONS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    /* ==========================================================================
       DYNAMIC DESIGN SYSTEM & THEME VARIABLES
       ========================================================================== */
    :root[data-theme="dark"] {
      --bg: #090d16;
      --surface: rgba(17, 24, 39, 0.65);
      --card: rgba(31, 41, 55, 0.55);
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #6366f1;
      --primary-glow: rgba(99, 102, 241, 0.3);
      --accent: #a855f7;
      --border: rgba(255, 255, 255, 0.07);
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
    }

    :root[data-theme="light"] {
      --bg: #f8fafc;
      --surface: rgba(255, 255, 255, 0.75);
      --card: rgba(241, 245, 249, 0.85);
      --text: #0f172a;
      --muted: #64748b;
      --primary: #3b82f6;
      --primary-glow: rgba(59, 130, 246, 0.2);
      --accent: #13c2c2;
      --border: rgba(15, 23, 42, 0.08);
      --shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.08);
    }

    /* Reset & Base Defaults */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      line-height: 1.5;
    }

    /* Accessibility Focus Outline */
    *:focus-visible {
      outline: 3px solid var(--primary);
      outline-offset: 4px;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 20px;
      border: 2px solid var(--bg);
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    /* Ambient Background Canvas */
    #particleCanvas {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    /* Layout Container */
    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Premium Glassmorphic Card Mixin */
    .glass {
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      transition: background 0.4s, border 0.4s, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ==========================================================================
       UTILITY HUD / FLOATING CONTROLS
       ========================================================================== */
    .hud-controls {
      position: fixed;
      top: 24px;
      left: 24px;
      right: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      pointer-events: none;
    }

    .hud-group {
      display: flex;
      gap: 12px;
      pointer-events: auto;
    }

    .hud-btn {
      border: none;
      height: 48px;
      padding: 0 20px;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: inherit;
      box-shadow: var(--shadow);
    }

    #ownerBtn {
      background: var(--primary);
      color: #ffffff;
      box-shadow: 0 8px 20px var(--primary-glow);
    }
 #ownerBtn {
  position: fixed;
  bottom: 24px;
  left: 24px;
  z-index: 1000;

  padding: 8px 12px;
  font-size: 12px;
  border-radius: 10px;
}

    .icon-btn {
      width: 48px;
      padding: 0;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      font-size: 18px;
    }

    /* ==========================================================================
       HERO FRAMEWORK
       ========================================================================== */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      align-items: center;
      gap: 60px;
      padding: 140px 0 80px;
    }

    .hero-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(40px, 6vw, 68px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -2px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--text) 30%, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .typewriter-wrapper {
      font-size: clamp(16px, 2.5vw, 22px);
      font-weight: 500;
      color: var(--primary);
      margin-bottom: 28px;
      min-height: 35px;
    }

    .intro-text {
      color: var(--muted);
      font-size: clamp(15px, 1.8vw, 17px);
      line-height: 1.8;
      max-width: 620px;
      margin-bottom: 40px;
      padding: 6px;
      border-radius: 8px;
    }
    .intro-text[contenteditable="true"] {
      border: 2px dashed var(--primary);
      background: rgba(99, 102, 241, 0.05);
    }

    /* Social Card Grid Links */
    .social-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
    }

    .social-card {
      text-decoration: none;
      color: var(--text);
      padding: 16px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 15px;
    }
    .social-card i {
      font-size: 20px;
      color: var(--primary);
    }
    .social-card:hover {
      transform: translateY(-4px);
      background: var(--primary);
      color: #ffffff;
      border-color: var(--primary);
    }
    .social-card:hover i {
      color: #ffffff;
    }

    /* Hero Avatar Showcase */
    .hero-display {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .avatar-wrapper {
      position: relative;
      width: 100%;
      max-width: 380px;
      aspect-ratio: 1;
      border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
      background: linear-gradient(45deg, var(--primary), var(--accent));
      animation: morphing 10s ease-in-out infinite alternate;
      overflow: hidden;
      box-shadow: 0 30px 60px var(--primary-glow);
    }
    .avatar-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      scale: 1.05;
    }

    @keyframes morphing {
      0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
      25% { border-radius: 58% 42% 75% 25% / 45% 50% 50% 55%; }
      50% { border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%; }
      75% { border-radius: 42% 58% 52% 48% / 33% 45% 55% 67%; }
      100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
    }

    /* ==========================================================================
       MAIN STRUCTURE WORKSPACE (SECTIONS)
       ========================================================================== */
    .section-block {
      padding: 60px;
      margin-bottom: 60px;
    }

    #portfolio {
  position: relative;
}

    .section-header-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(28px, 4vw, 38px);
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 35px;
    }

    /* Scroll Reveal Animation Initial Classes */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }

    /* Portfolio Gallery Horizon Grid */
.showcase-gallery {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
  gap: 20px;
  padding-bottom: 14px;
}

/* Scrollbar horizontal custom */
.showcase-gallery::-webkit-scrollbar {
  height: 10px;
}

.showcase-gallery::-webkit-scrollbar-track {
  background: var(--card);
  border-radius: 20px;
}

.showcase-gallery::-webkit-scrollbar-thumb {
  background: var(--primary);
  border-radius: 20px;
}

.showcase-gallery::-webkit-scrollbar-thumb:hover {
  background: var(--accent);
}


    .art-card {
  position: relative;
  aspect-ratio: 1;
  border-radius: 20px;
  overflow: hidden;
  background: var(--card);
  border: 1px solid var(--border);

  flex: 0 0 calc((100% - 60px) / 4);
  scroll-snap-align: start;
}
    .art-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s;
    }
    .art-card:hover img {
      transform: scale(1.08);
    }

    .file-dropzone {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      z-index: 5;
      display: none;
    }
    .placeholder-icon {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      pointer-events: none;
    }
    .placeholder-icon i { font-size: 32px; color: var(--primary); }

    .card-actions-overlay {
      position: absolute;
      inset: 0;
      background: rgba(9, 13, 22, 0.8);
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 6;
    }
    .art-card:hover .card-actions-overlay {
      opacity: 1;
    }
    .overlay-btn {
      border: none;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-edit { background: #ffffff; color: #000000; }
    .btn-del { background: #ef4444; color: #ffffff; }

    .showcase-desc {
      padding: 24px;
      font-size: 16px;
      line-height: 1.8;
      color: var(--muted);
      min-height: 80px;
    }
    .showcase-desc[contenteditable="true"] {
      border: 2px dashed var(--primary);
      background: rgba(99, 102, 241, 0.05);
    }

    /* ==========================================================================
       GUESTBOOK / FEEDBACK MODULE
       ========================================================================== */
    .guestbook-wrapper {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 50px;
      align-items: start;
    }

    .form-box {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .input-field {
      width: 100%;
      border: none;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      transition: border-color 0.3s;
    }
    .input-field:focus {
      outline: none;
      border-color: var(--primary);
    }
    textarea.input-field {
      resize: none;
      min-height: 140px;
    }
    .submit-btn {
      border: none;
      padding: 16px;
      border-radius: 14px;
      background: var(--primary);
      color: #ffffff;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 10px 20px var(--primary-glow);
      transition: opacity 0.3s, transform 0.2s;
    }
    .submit-btn:hover { opacity: 0.95; transform: translateY(-1px); }

    .comment-stack {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: 550px;
      overflow-y: auto;
      padding-right: 8px;
    }

    .comment-node {
      padding: 20px;
      border-radius: 18px;
    }
    .node-header {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .node-user { font-weight: 700; color: var(--primary); }
    .node-time { color: var(--muted); }
    .node-text { font-size: 15px; color: var(--text); word-break: break-word; }

    .node-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .heart-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
    }
    .heart-btn:hover, .heart-btn.liked {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border-color: #ef4444;
    }
    .heart-btn.liked {
      background: #ef4444;
      color: #ffffff;
    }

    /* ==========================================================================
       TOAST POPUP NOTIFICATION ENGINE
       ========================================================================== */
    #toastContainer {
      position: fixed;
      bottom: 24px;
      left: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10000;
    }
    .toast {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 14px 20px;
      border-radius: 12px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 14px;
      min-width: 250px;
      animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes slideIn {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* ==========================================================================
       MEDIA BREAKPOINTS
       ========================================================================== */
    @media (max-width: 992px) {
      .hero { grid-template-columns: 1fr; text-align: center; padding-top: 16px; }
      .intro-text { margin: 0 auto 40px; }
      .social-grid { justify-content: center; }
      .guestbook-wrapper { grid-template-columns: 1fr; }
      .section-block { padding: 30px 20px; }
    }
  @media (max-width: 768px) {
  .art-card {
    flex: 0 0 calc((100% - 20px) / 2);
  }
}
  </style>
</head>
<body>

  <!-- Background Elements -->
  <canvas id="particleCanvas" aria-hidden="true"></canvas>

  <!-- Global Toast Hub Container -->
  <div id="toastContainer" role="alert" aria-live="assertive"></div>

  <!-- HUD Control Bar Header -->
  <header class="hud-controls">
    <div class="hud-group">
      <button id="ownerBtn" class="hud-btn" aria-label="Aktifkan Mode Pemilik">OWNER MODE</button>
    </div>
    <div class="hud-group">
      <!-- Music Player Box Container -->
      <button id="themeBtn" class="hud-btn icon-btn" aria-label="Ganti Tema Warna">
        <i class="fas fa-moon"></i>
      </button>
    </div>
  </header>

  <main class="container">
    
    <!-- HERO COMPONENT -->
    <section class="hero" id="home">
      <div class="hero-content">
        <h1 class="hero-title">hilmy.cc</h1>
        <div class="typewriter-wrapper">
          <span id="typewriterTarget" aria-live="polite"></span>
        </div>
        <p id="editableIntro" class="intro-text" contenteditable="false">hi, welcome to my website. im hilmy and this is my personal website where i share my works and social media. enjoy!</p>
        
        <nav class="social-grid" aria-label="Tautan Media Sosial">
          <a href="https://instagram.com" target="_blank" rel="noopener" class="social-card glass"><i class="fab fa-instagram"></i> Instagram</a>
          <a href="https://discord.com" target="_blank" rel="noopener" class="social-card glass"><i class="fab fa-discord"></i> Discord</a>
          <a href="https://spotify.com" target="_blank" rel="noopener" class="social-card glass"><i class="fab fa-spotify"></i> Spotify</a>
         <a href="https://letterboxd.com" target="_blank" rel="noopener" class="social-card glass"><i class="fas fa-film"></i> Letterboxd</a>
        </nav>
      </div>

      <div class="hero-display">
        <div class="avatar-wrapper">
          <img src="BE.png" alt="Avatar Ilustrasi Kreatif Hilmy" onerror="this.src='https://picsum.photos/seed/hilmyspace/400/400'">
        </div>
      </div>
    </section>

    <!-- HUB PORTOFOLIO SHOWCASE SECTION -->
    <section class="section-block glass reveal" id="portfolio">
      <h2 class="section-header-text">My Art Gallery</h2>
      <div class="showcase-gallery" id="galleryGrid"></div>
      <div id="editableDesc" class="showcase-desc glass" contenteditable="false">Memuat deskripsi galeri...</div>
    </section>

    <!-- INTERACTIVE GUESTBOOK SECTION -->
    <section class="section-block glass reveal" id="guestbook">
      <h2 class="section-header-text">Guestbook</h2>
      <div class="guestbook-wrapper">
        <div class="form-box">
          <input type="text" id="senderName" class="input-field" placeholder="Nama Anda" maxlength="30" required/>
          <textarea id="senderMessage" class="input-field" placeholder="Tulis pesan anda" maxlength="500" required></textarea>
          <button class="submit-btn" onclick="publishComment()">Kirim Pesan</button>
        </div>
        <div class="comment-stack" id="commentFeedContainer"></div>
      </div>
    </section>

  </main>

  <script>
    /* ==========================================================================
       TOAST NOTIFICATION ENGINE
       ========================================================================== */
    function pushToast(msg, iconClass = "fa-info-circle") {
      const container = document.getElementById("toastContainer");
      const el = document.createElement("div");
      el.className = "toast";
      el.innerHTML = `<i class="fas ${iconClass}" style="color:var(--primary)"></i> <span>${msg}</span>`;
      container.appendChild(el);
      setTimeout(() => {
        el.style.animation = "slideIn 0.3s ease reverse forwards";
        setTimeout(() => el.remove(), 300);
      }, 3500);
    }

    /* ==========================================================================
       PERSISTENT CORE SYSTEM & OWNER CONTROLLER (contenteditable)
       ========================================================================== */
    const MASTER_KEY = "hilmyowner";
    let IS_OWNER = localStorage.getItem("ownerSession") === "true";

    const config = {
      introFallback: "hi, welcome to my website. im hilmy and this is my personal website where i share my works and social media. enjoy!",
      descFallback: "my personal arts",
      slotsCount: 20
    };

    const nodes = {
      intro: document.getElementById("editableIntro"),
      desc: document.getElementById("editableDesc"),
      ownerBtn: document.getElementById("ownerBtn")
    };

    // Hydration
    nodes.intro.innerText = localStorage.getItem("db_intro") || config.introFallback;
    nodes.desc.innerText = localStorage.getItem("db_desc") || config.descFallback;

    nodes.ownerBtn.addEventListener("click", () => {
      if (IS_OWNER) {
        IS_OWNER = false;
        localStorage.setItem("ownerSession", "false");
        pushToast("Mode pemilik dimatikan", "fa-user-slash");
        setTimeout(() => location.reload(), 800);
        return;
      }
      const token = prompt("Masukkan kunci otentikasi pemilik:");
      if (token === MASTER_KEY) {
        IS_OWNER = true;
        localStorage.setItem("ownerSession", "true");
        bootstrapOwnerState();
        pushToast("Akses diizinkan. Selamat datang kembali!", "fa-user-check");
      } else if (token !== null) {
        pushToast("Kunci akses salah!", "fa-exclamation-triangle");
      }
    });

    function bootstrapOwnerState() {
      nodes.ownerBtn.innerText = "OWNER: ACTIVE";
      nodes.ownerBtn.style.background = "#10b981";
      nodes.ownerBtn.style.boxShadow = "0 8px 20px rgba(16, 185, 129, 0.3)";

      document.querySelectorAll(".file-dropzone").forEach(el => el.style.display = "block");
      document.querySelectorAll(".placeholder-icon").forEach(el => el.style.display = "flex");

      nodes.intro.contentEditable = true;
      nodes.desc.contentEditable = true;

      nodes.intro.addEventListener("input", () => localStorage.setItem("db_intro", nodes.intro.innerText));
      nodes.desc.addEventListener("input", () => localStorage.setItem("db_desc", nodes.desc.innerText));
    }

    /* ==========================================================================
       BASE64 STORAGE PORTFOLIO GRID HOOKS
       ========================================================================== */
    const galleryGrid = document.getElementById("galleryGrid");
    let imagesDatabase = JSON.parse(localStorage.getItem("db_gallery_images")) || {};

    function renderGalleryFramework() {
      galleryGrid.innerHTML = "";
      for (let i = 0; i < config.slotsCount; i++) {
        const item = document.createElement("div");
        item.className = "art-card";
        item.setAttribute("data-id", i);

        if (imagesDatabase[i]) {
          item.innerHTML = `
            <img src="${imagesDatabase[i]}" alt="Karya Seni Slot ${i}">
            <input type="file" class="file-dropzone" accept="image/*" onchange="uploadImage(event, ${i})">
            ${IS_OWNER ? `
              <div class="card-actions-overlay">
                <button class="overlay-btn btn-edit" onclick="triggerFileInput(${i})">Ganti</button>
                <button class="overlay-btn btn-del" onclick="deleteSlot(${i})">Hapus</button>
              </div>
            ` : ''}
          `;
        } else {
          item.innerHTML = `
            <div class="placeholder-icon" style="display: ${IS_OWNER ? 'flex' : 'none'}">
              <i class="fas fa-cloud-upload-alt"></i>
              <span>Upload Gambar</span>
            </div>
            <input type="file" class="file-dropzone" accept="image/*" style="display: ${IS_OWNER ? 'block' : 'none'}" onchange="uploadImage(event, ${i})">
          `;
        }
        galleryGrid.appendChild(item);
      }
    }

    function triggerFileInput(id) {
      document.querySelector(`.art-card[data-id="${id}"] .file-dropzone`).click();
    }

    async function uploadImage(e, slot) {

  const file = e.target.files[0];

  if (!file) return;

  pushToast("Uploading image...", "fa-spinner");

  const formData = new FormData();

  formData.append("file", file);

  formData.append(
    "upload_preset",
    "hilmy_upload"
  );

  try {

    const response = await fetch(
      "https://api.cloudinary.com/v1_1/dqayfxo03/image/upload",
      {
        method: "POST",
        body: formData
      }
    );

    const data = await response.json();

    imagesDatabase[slot] = data.secure_url;

    localStorage.setItem(
      "db_gallery_images",
      JSON.stringify(imagesDatabase)
    );

    renderGalleryFramework();

    pushToast(
      "Image uploaded successfully!",
      "fa-check-circle"
    );

  } catch (err) {

    console.error(err);

    pushToast(
      "Upload failed!",
      "fa-exclamation-circle"
    );
  }
}

    function deleteSlot(slot) {
      if (confirm(`Hapus gambar pada slot ${slot}?`)) {
        delete imagesDatabase[slot];
        localStorage.setItem("db_gallery_images", JSON.stringify(imagesDatabase));
        renderGalleryFramework();
        pushToast("Gambar dihapus dari database lokal");
      }
    }

    /* ==========================================================================
       TYPEWRITER TEXT ROTATION LOGIC
       ========================================================================== */
    const strings = ["Welcome to my space.", "Creating. Sharing. Growing.", "Just hilmy on the internet."];
    let stringIdx = 0, letterIdx = 0, outText = "", eraseState = false;

    function coreTypeEngine() {
      const activeString = strings[stringIdx];
      const target = document.getElementById("typewriterTarget");

      if (!eraseState) {
        outText = activeString.substring(0, letterIdx++);
        target.textContent = outText;
        if (letterIdx > activeString.length) {
          eraseState = true;
          setTimeout(coreTypeEngine, 2000);
          return;
        }
      } else {
        outText = activeString.substring(0, letterIdx--);
        target.textContent = outText;
        if (letterIdx < 0) {
          eraseState = false;
          stringIdx = (stringIdx + 1) % strings.length;
        }
      }
      setTimeout(coreTypeEngine, eraseState ? 40 : 80);
    }

    /* ==========================================================================
       LIGHT / DARK MIXED COLOR CONTROLLER
       ========================================================================== */
    const themeBtn = document.getElementById("themeBtn");
    const activeTheme = localStorage.getItem("db_theme_v2") || "dark";

    document.documentElement.setAttribute("data-theme", activeTheme);
    refreshThemeButtonIcon(activeTheme);

    themeBtn.addEventListener("click", () => {
      const current = document.documentElement.getAttribute("data-theme");
      const nextTheme = current === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", nextTheme);
      localStorage.setItem("db_theme_v2", nextTheme);
      refreshThemeButtonIcon(nextTheme);
    });

    function refreshThemeButtonIcon(theme) {
      const icon = themeBtn.querySelector("i");
      icon.className = theme === "dark" ? "fas fa-sun" : "fas fa-moon";
    }

    

    /* ==========================================================================
       XSS SECURE COMPACT GUESTBOOK WITH LIKE SYSTEM
       ========================================================================== */
    let commentsFeed = JSON.parse(localStorage.getItem("db_comments_v2")) || [];
    let localLikesLog = JSON.parse(localStorage.getItem("db_user_likes")) || [];
    let spamCooldown = localStorage.getItem("db_cooldown_timestamp") || 0;

    function escapeHTML(payload) {
      return payload.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    function renderCommentsFeed() {
      const feed = document.getElementById("commentFeedContainer");
      feed.innerHTML = "";

      if (commentsFeed.length === 0) {
        feed.innerHTML = `<div style="text-align:center; padding:20px; color:var(--muted)">Belum ada pesan. Jadi yang pertama menyapa!</div>`;
        return;
      }

      commentsFeed.forEach(node => {
        if (node.likes === undefined) node.likes = 0;
        const stateLiked = localLikesLog.includes(node.id);

        const card = document.createElement("div");
        card.className = "comment-node glass";
        card.innerHTML = `
          <div class="node-header">
            <span class="node-user">${escapeHTML(node.user)}</span>
            <span class="node-time">${node.timestamp}</span>
          </div>
          <p class="node-text">${escapeHTML(node.text)}</p>
          <div class="node-footer">
            <button class="heart-btn ${stateLiked ? 'liked' : ''}" onclick="mutateLikeState('${node.id}')" aria-label="Sukai komentar ini">
              <i class="${stateLiked ? 'fas' : 'far'} fa-heart"></i>
              <span>${node.likes}</span>
            </button>
            ${IS_OWNER ? `<button class="overlay-btn btn-del" onclick="purgeComment('${node.id}')">Hapus</button>` : ''}
          </div>
        `;
        feed.appendChild(card);
      });
    }

    function publishComment() {
      const userBox = document.getElementById("senderName");
      const msgBox = document.getElementById("senderMessage");
      const userVal = userBox.value.trim();
      const msgVal = msgBox.value.trim();
      const now = Date.now();

      if (!userVal || !msgVal) {
        pushToast("Harap isi semua kolom input!", "fa-exclamation-circle");
        return;
      }
      if (now - spamCooldown < 60000) { // Limit proteksi diperingan menjadi 1 menit demi kenyamanan tes
        pushToast("Batas waktu interaksi! Mohon tunggu beberapa saat.", "fa-hourglass-half");
        return;
      }

      const freshComment = {
        id: "node_id_" + Date.now() + Math.floor(Math.random() * 100),
        user: userVal,
        text: msgVal,
        timestamp: new Date().toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'}),
        likes: 0
      };

      commentsFeed.unshift(freshComment);
      localStorage.setItem("db_comments_v2", JSON.stringify(commentsFeed));
      localStorage.setItem("db_cooldown_timestamp", now);
      spamCooldown = now;

      pushToast("Pesan terkirim ke guestbook!", "fa-check-circle");
      userBox.value = "";
      msgBox.value = "";
      renderCommentsFeed();
    }

    function mutateLikeState(id) {
      const idx = commentsFeed.findIndex(x => x.id === id);
      if (idx === -1) return;

      const logIdx = localLikesLog.indexOf(id);
      if (logIdx === -1) {
        commentsFeed[idx].likes += 1;
        localLikesLog.push(id);
        pushToast("Komentar disukai");
      } else {
        commentsFeed[idx].likes -= 1;
        localLikesLog.splice(logIdx, 1);
        pushToast("Batal menyukai komentar");
      }

      localStorage.setItem("db_comments_v2", JSON.stringify(commentsFeed));
      localStorage.setItem("db_user_likes", JSON.stringify(localLikesLog));
      renderCommentsFeed();
    }

    /* ==========================================================================
       SCROLL DRIVEN INTERSECTION OBSERVER REVEAL
       ========================================================================== */
    const revealItems = document.querySelectorAll(".reveal");
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add("active");
        }
      });
    }, { threshold: 0.12 });

    revealItems.forEach(item => observer.observe(item));

    /* ==========================================================================
       HIGH-PERFORMANCE CANVAS AMBIENT LIGHT
       ========================================================================== */
    const canvas = document.getElementById("particleCanvas");
    const ctx = canvas.getContext("2d");
    let pointGrid = [];

    function syncCanvasBoundaries() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      buildPoints();
    }

    function buildPoints() {
      pointGrid = [];
      const calculatedVolume = window.innerWidth < 768 ? 25 : 65;
      for (let i = 0; i < calculatedVolume; i++) {
        pointGrid.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: Math.random() * 2.5 + 0.5,
          vx: (Math.random() - 0.5) * 0.4,
          vy: (Math.random() - 0.5) * 0.4
        });
      }
    }

    function renderPointsLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const activeColorHex = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim();
      ctx.fillStyle = activeColorHex + "44"; // Transparansi 25%

      pointGrid.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();

        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
      });
      requestAnimationFrame(renderPointsLoop);
    }
    window.addEventListener("resize", syncCanvasBoundaries);

    /* ==========================================================================
       BOOTSTRAP INITIALIZER
       ========================================================================== */
    document.addEventListener("DOMContentLoaded", () => {
     

      syncCanvasBoundaries();
      renderPointsLoop();
      coreTypeEngine();
      renderGalleryFramework();
      renderCommentsFeed();

      if (IS_OWNER) bootstrapOwnerState();
    });
  </script>

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.publishComment = async function () {

  const userBox = document.getElementById("senderName");
  const msgBox = document.getElementById("senderMessage");

  const userVal = userBox.value.trim();
  const msgVal = msgBox.value.trim();

  if (!userVal || !msgVal) {
    alert("Isi semua kolom");

  }

  await addDoc(collection(db, "comments"), {
    user: userVal,
    text: msgVal,
    timestamp: Date.now()
  });

  userBox.value = "";
  msgBox.value = "";

  loadComments();
};

async function loadComments() {

  const feed = document.getElementById("commentFeedContainer");

  feed.innerHTML = "";

  const q = query(
    collection(db, "comments"),
    orderBy("timestamp", "desc")
  );

  const querySnapshot = await getDocs(q);

  querySnapshot.forEach((firebaseDoc) => {

    const data = firebaseDoc.data();

    const card = document.createElement("div");

    card.className = "comment-node glass";

    card.innerHTML = `
  <div class="node-header">
    <span class="node-user">${data.user}</span>
  </div>

  <p class="node-text">${data.text}</p>

  ${
    IS_OWNER
    ?
    `
    <div class="node-footer">
      <button
        class="overlay-btn btn-del"
        onclick="purgeComment('${firebaseDoc.id}')"
      >
        Hapus
      </button>
    </div>
    `
    :
    ""
  }
`;

    feed.appendChild(card);
  });
}
 window.purgeComment = async function(id) {

  const confirmed = confirm(
    "Hapus komentar ini?"
  );

  if (!confirmed) return;

  try {

    await deleteDoc(
      doc(db, "comments", id)
    );

    pushToast(
      "Komentar berhasil dihapus",
      "fa-check-circle"
    );

    loadComments();

  } catch(err) {

    console.error(err);

    pushToast(
      "Gagal menghapus komentar",
      "fa-exclamation-circle"
    );
  }
}

loadComments();

</script>
